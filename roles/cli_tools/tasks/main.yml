---
# ─── macOS ────────────────────────────────────────────────────────────────────

- name: cli_tools | Install CLI tools (macOS)
  community.general.homebrew:
    name: "{{ cli_packages_macos }}"
    state: present
    update_homebrew: false
  when: ansible_os_family == 'Darwin'

# ─── Arch Linux ───────────────────────────────────────────────────────────────

- name: cli_tools | Install CLI tools from official repos (Arch)
  community.general.pacman:
    name: "{{ cli_packages_arch }}"
    state: present
  become: true
  when: ansible_distribution == 'Archlinux'

- name: cli_tools | Install CLI tools from AUR (Arch)
  ansible.builtin.command: "yay -S --noconfirm --needed {{ cli_packages_arch_aur | join(' ') }}"
  register: yay_cli_result
  changed_when: "'nothing to do' not in yay_cli_result.stdout | lower"
  when: ansible_distribution == 'Archlinux'
