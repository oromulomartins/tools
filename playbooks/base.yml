---
- name: Base packages setup
  hosts: localhost
  connection: local
  gather_facts: true
  become: false

  tasks:
    - name: Install Homebrew
      ansible.builtin.include_role:
        name: homebrew
      when: ansible_os_family == 'Darwin'

    - name: Install base packages
      ansible.builtin.include_role:
        name: base
